version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - talentconnect-network
    restart: unless-stopped

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: tc-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/vjtalentconnect
      - FRONTEND_URL=http://localhost  # Update to exact domain in prod
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - mongodb
    networks:
      - talentconnect-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tc-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - talentconnect-network
    restart: unless-stopped

networks:
  talentconnect-network:
    driver: bridge

volumes:
  mongodb_data:
